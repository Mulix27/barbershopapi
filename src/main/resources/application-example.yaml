spring:
  application:
    name: barbershopapi

  # ── Base de datos ────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ───────────────────────────────────────────────────
  flyway:
    enabled: false

# ── JWT ─────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

  frontend-url: ${FRONTEND_URL}

  # ── Cloudinary ───────────────────────────────────────────────
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

# ── Swagger UI ──────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

# ── Logging ─────────────────────────────────────────────────────
logging:
  level:
    com.bruno: DEBUG
    org.springframework.security: INFO

servlet:
  multipart:
    enabled: true
    max-file-size: 10MB
    max-request-size: 12MB